<svg width="42" height="42" viewBox="0 0 42 42" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>vTree icon</title>
  <desc>vTree file manager icon, 42x42px, black on transparent</desc>

  <!-- V chevron at top -->
  <polyline points="8,5 21,16 34,5" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Vertical spine -->
  <line x1="21" y1="16" x2="21" y2="38" stroke="black" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Horizontal branch lines -->
  <line x1="21" y1="21" x2="28" y2="21" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="27" x2="28" y2="27" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="33" x2="28" y2="33" stroke="black" stroke-width="2" stroke-linecap="round"/>

  <!-- File block indicators -->
  <rect x="29" y="18.5" width="8"  height="4" rx="1" fill="black"/>
  <rect x="29" y="24.5" width="10" height="4" rx="1" fill="black"/>
  <rect x="29" y="30.5" width="9"  height="4" rx="1" fill="black"/>

</svg>
